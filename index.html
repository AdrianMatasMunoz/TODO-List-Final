<!DOCTYPE html>
<html lang="ca">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height">
        <title>Llista d'Activitats</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./css/style.css">
    </head>
    <body>
        <header>
            <div class="header-top">
                <h1>Gestió de tasques pendents</h1>
            </div>
            <div class="header-bottom">
                <p>Adrián Matas Muñoz - Tasca final Llenguatge De Marques</p>
            </div>
        </header>
        <main>
            <aside id="menu-aside">
                <h2>Menús</h2>
                <ul>
                    <li><a href="./index.html" target="_self">
                        Llista d'Activitats
                    </a></li>
                    <li><a href="./crear-tasca.html" target="_self">
                        Creació de Tasques
                    </a></li>
                    <li><a href="./categories.html" target="_self">
                        Creació de Categories
                    </a></li>
                </ul>
                <button id="responsive-btn">&gt;</button>
            </aside>
            <section id="main-section">
                <section class="menu-app">
                    <h2>Llista d'Activitats</h2>
                    <form>
                        <label for="file-input">Importar tasques: </label>
                        <input type="file" id="file-input" name="fileInput" accept=".json" required>
                        <button type="submit">Carregar</button>
                    </form>
                </section>
                <h2>Tasques Pendents</h2>
                <p id="no-unfinished-tasks" class="hide">No hi ha cap tasca pendent.</p>
                <section id="unfinished-tasks"></section>
                <h2>Tasques Finalitzades</h2>
                <p id="no-finished-tasks" class="hide">No hi ha cap tasca finalitzada.</p>
                <section id="finished-tasks"></section>
            </section>
        </main>

        <script src="./js/responsive.js"></script>
        <script type="module" src="./js/llistaActivitats.js"></script>
    </body>
</html>
