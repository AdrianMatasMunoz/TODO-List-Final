<!DOCTYPE html>
<html lang="ca">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Llista d'Activitats</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./css/style.css">
    </head>
    <body>
        <header>
            <div class="header-top">
                <h1>Gestió de tasques pendents</h1>
            </div>
            <div class="header-bottom">
                <p>Adrián Matas Muñoz - Tasca final Llenguatge De Marques</p>
            </div>
        </header>
        <main>
            <aside id="menu-aside">
                <h2>Menús</h2>
                <ul>
                    <li><a href="./index.html" target="_self">
                        Llista d'Activitats
                    </a></li>
                    <li><a href="./crear-tasca.html" target="_self">
                        Creació de Tasques
                    </a></li>
                    <li><a href="./categories.html" target="_self">
                        Creació de Categories
                    </a></li>
                </ul>
                <button id="responsive-btn">&gt;</button>
            </aside>
            <section id="main-section">
                <section class="menu-app">
                    <h2>Crear una Tasca</h2>
                    <form>
                        <label for="titol-tasca">Titol de la Tasca:</label>
                        <input type="text" id="titol-tasca" name="titolTasca" required>
                        <label for="descripcio-tasca">Descripció de la Tasca:</label>
                        <textarea id="descripcio-tasca" name="descripcioTasca"></textarea>
                        <label for="data-tasca">Data:</label>
                        <input type="date" id="data-tasca" name="dataTasca" required>
                        <label for="categoria-tasca">Categoria:</label>
                        <select id="categoria-tasca" required></select>
                        <label for="prioritat-tasca">Prioritat:</label>
                        <select id="prioritat-tasca" required>
                            <option value="Baixa">Baixa</option>
                            <option value="Mitjana">Mitjana</option>
                            <option value="Alta">Alta</option>
                        </select>

                        <button type="submit">Crear</button>
                    </form>
                </section>
            </section>
        </main>

        <script src="./js/responsive.js"></script>
        <script type="module" src="./js/tasques.js"></script>
    </body>
</html>
